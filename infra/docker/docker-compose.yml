version: "3.9"

services:
  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    env_file:
      - ../../apps/backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    env_file:
      - ../../apps/frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend
